<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8"/>
	<style>
		#startActionButton {
			position: fixed;
			left: 50%;
			bottom: 24px;
			transform: translateX(-50%);
			z-index: 10;
			padding: 10px 16px;
			border: 1px solid #333333;
			border-radius: 6px;
			background: #ffffff;
			color: #111111;
			font-size: 16px;
			cursor: pointer;
		}
	</style>
	<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
	<script src="https://unpkg.com/@pixiv/three-vrm@1.0.0/lib/three-vrm.js"></script>
	<script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
	<script src="./lesson_actions.js"></script>
	<script src="./main.js"></script>
</head>
<body>
	<button id="startActionButton" type="button">Start Action</button>
	<a-scene stats loading-screen="dotsColor: gray; backgroundColor: lightgray">
		<a-sky color="#ECECEC"></a-sky>
		<a-entity environment="preset: dream; lighting: none;"></a-entity>
		<!--<a-plane position="0 0.05 -5" rotation="-90 0 0" width="6" height="6" color="#7BC8A4"></a-plane>-->
		<a-entity light="type: ambient; color: #FFFFFF; intensity: 0.25"></a-entity>
		<a-entity light="type: directional; color: #FFFFFF; intensity: 0.6" position="1 3 2"></a-entity>
		<a-entity vrm-model="src: ./assets/VRM/Avatar_z.vrm" position="0 0 -4"></a-entity>
		<a-camera id="my_camera" position="0 1.4 -2.2">
			<!--<a-cursor></a-cursor>-->
		</a-camera>
	</a-scene>
</body>
</html>
